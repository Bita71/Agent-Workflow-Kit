# Agent Workflow Kit configuration. Keep this file free of secrets.
CONFIG_VERSION=1
MODE=template

# This source checkout validates itself. Installed projects receive their command
# from `scripts/install.sh --check-command`.
CHECK_COMMAND=scripts/validate.sh

# `auto` resolves origin/HEAD, then the current branch. A ref may be pinned instead.
BASE_REF=auto

# Comma-separated profiles. `core` is mandatory; add only applicable profiles.
PROFILES=core

# Comma-separated host adapters installed in the repository.
TOOLS=claude,codex,cursor

ARTIFACT_LANGUAGE=english
COMMIT_CONVENTION=conventional-commits
SHELL_FAMILY=bash-posix
DEPENDENCY_ECOSYSTEM=auto

# Optional runner integration. `none` means the runner pattern is not enabled.
RUNNER_PLAN_COMMAND=none
RUNNER_EXEC_COMMAND=none
RUNNER_CLEAN_COMMAND=none
RUNNER_NETWORK_ALLOWED_DOMAINS=none

# Editable preferred defaults recovered from the original kit. `auto` remains a
# valid per-project override. Keep concrete IDs here, not in workflows/adapters.
PLANNER_MODEL=gpt-5.5
BUILDER_MODEL=claude-opus-4-8
CORRECTNESS_MODEL=gpt-5.5
SECURITY_MODEL=gpt-5.5
DESIGN_MODEL=claude-opus-4-8

# Optional selectors used when the normal role model is not the best fit.
BALANCED_MODEL=claude-sonnet-5
LONG_RUN_MODEL=claude-fable-5
MECHANICAL_MODEL=claude-haiku-4-5-20251001

DEFAULT_EFFORT=high
CODEX_MAX_EFFORT=xhigh
